services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    image: manumm20/vivida-backend:v1
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    image: manumm20/vivida-frontend:v1
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - backend
